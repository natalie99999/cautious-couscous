<title>Kent &amp; Babylon — Far West China</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Mulish:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════
   COLORS — Silk Road Travel
   A warm Western-China landscape palette: clay & desert (Silk Road,
   Danxia), jade & deep teal (Yunnan, Tibetan lakes), amber (temples,
   prayer flags), indigo night (the high plateau), on warm sand.
   ════════════════════════════════════════════════════════════ */

:root {
  /* ── Warm neutrals (sand / ink) ───────────────────────────── */
  --sand-50:  #FBF8F2;
  --sand-100: #F5EEE2;
  --sand-200: #ECE2D1;
  --sand-300: #DDCDB5;
  --sand-400: #C3AE8E;
  --stone-500: #93826B;
  --stone-600: #6E5F4C;
  --ink-700:  #463E34;
  --ink-800:  #2E2820;
  --ink-900:  #211C16;

  /* ── Clay — primary brand (terracotta / Silk Road desert) ── */
  --clay-100: #F6E2D6;
  --clay-200: #EBC1A9;
  --clay-300: #DC9A75;
  --clay-400: #CC744A;
  --clay-500: #BE5A30;  /* brand */
  --clay-600: #A24A26;
  --clay-700: #823A1E;
  --clay-800: #5F2C18;

  /* ── Jade — secondary (Yunnan forest / high lakes) ────────── */
  --jade-100: #DCEAE3;
  --jade-200: #AFCEC2;
  --jade-300: #6FA395;
  --jade-500: #2F7A6B;
  --jade-600: #226053;
  --jade-700: #194B41;
  --jade-800: #143B33;

  /* ── Amber — accent (temple gold, prayer flags) ───────────── */
  --amber-200: #F3DCA5;
  --amber-400: #E0B057;
  --amber-500: #CE9A35;
  --amber-600: #AC7E25;

  /* ── Indigo — tertiary (night sky over the plateau) ───────── */
  --indigo-700: #2B3A57;
  --indigo-800: #202C44;
  --indigo-900: #161F31;

  /* ── Status ───────────────────────────────────────────────── */
  --success-500: #3F8F5B;
  --success-100: #DCEEDF;
  --warning-500: #C98A1E;
  --warning-100: #F6E8C8;
  --danger-500:  #B23B2E;
  --danger-100:  #F3DAD3;

  /* ════════════════════════════════════════════════════════════
     SEMANTIC ALIASES — reference these, not raw scale values
     ════════════════════════════════════════════════════════════ */

  /* Brand */
  --brand:           var(--clay-500);
  --brand-strong:    var(--clay-600);
  --brand-contrast:  #FFFFFF;
  --brand-tint:      var(--clay-100);
  --accent:          var(--amber-500);
  --accent-deep:     var(--jade-600);

  /* Text */
  --text-primary:    var(--ink-900);
  --text-secondary:  var(--stone-600);
  --text-muted:      var(--stone-500);
  --text-inverse:    var(--sand-50);
  --text-brand:      var(--clay-600);
  --text-on-dark:    rgba(255,255,255,0.92);
  --text-on-dark-dim: rgba(255,255,255,0.66);

  /* Surfaces */
  --surface-page:    var(--sand-50);
  --surface-raised:  #FFFFFF;
  --surface-sunken:  var(--sand-100);
  --surface-inset:   var(--sand-200);
  --surface-dark:    var(--ink-900);
  --surface-jade:    var(--jade-700);
  --surface-brand:   var(--clay-500);

  /* Lines & borders */
  --border-subtle:   rgba(46,40,32,0.10);
  --border-default:  rgba(46,40,32,0.16);
  --border-strong:   rgba(46,40,32,0.28);
  --border-on-dark:  rgba(255,255,255,0.22);

  /* Focus */
  --focus-ring:      var(--clay-400);
}

/* ════════════════════════════════════════════════════════════
   TYPOGRAPHY — Silk Road Travel
   Cormorant Garamond (display serif) + Mulish (body / UI sans).
   Display carries the editorial, luxury-travel voice; Mulish keeps
   controls and running text clean and legible.
   ════════════════════════════════════════════════════════════ */

:root {
  /* Families */
  --font-display: 'Cormorant Garamond', 'Times New Roman', serif;
  --font-body:    'Mulish', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono:    'SFMono-Regular', ui-monospace, 'Menlo', monospace;

  /* Weights */
  --weight-light:    300;
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;
  --weight-display:  600; /* default for display serif */

  /* Fluid display scale (hero / section titles — serif) */
  --text-display-xl: clamp(3.25rem, 1.6rem + 6.4vw, 6rem);     /* @kind spacing */
  --text-display-lg: clamp(2.5rem, 1.4rem + 4.6vw, 4.25rem);   /* @kind spacing */
  --text-display-md: clamp(2rem, 1.3rem + 2.8vw, 3rem);        /* @kind spacing */
  --text-display-sm: clamp(1.6rem, 1.2rem + 1.6vw, 2.25rem);   /* @kind spacing */

  /* Body / UI scale (sans) */
  --text-xs:   0.75rem;   /* 12 */
  --text-sm:   0.875rem;  /* 14 */
  --text-base: 1rem;      /* 16 */
  --text-md:   1.125rem;  /* 18 */
  --text-lg:   1.3125rem; /* 21 */
  --text-xl:   1.5rem;    /* 24 */

  /* Line heights */
  --leading-tight:   1.08;
  --leading-snug:    1.25;
  --leading-normal:  1.5;
  --leading-relaxed: 1.7;

  /* Letter spacing */
  --tracking-tight:  -0.02em;
  --tracking-normal: 0;
  --tracking-wide:   0.04em;
  --tracking-eyebrow: 0.18em; /* uppercase labels / eyebrows */
}

/* ── Type helpers ─────────────────────────────────────────────
   Optional convenience classes; tokens above are the source of truth. */

.t-display {
  font-family: var(--font-display);
  font-weight: var(--weight-display);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--text-primary);
}
.t-eyebrow {
  font-family: var(--font-body);
  font-weight: var(--weight-semibold);
  font-size: var(--text-sm);
  letter-spacing: var(--tracking-eyebrow);
  text-transform: uppercase;
  color: var(--text-brand);
}
.t-body {
  font-family: var(--font-body);
  font-weight: var(--weight-regular);
  font-size: var(--text-base);
  line-height: var(--leading-relaxed);
  color: var(--text-secondary);
}

/* ════════════════════════════════════════════════════════════
   SPACING · RADIUS · SHADOW · LAYOUT — Silk Road Travel
   4px base grid. Editorial radii (modest, not bubbly). Soft, warm,
   low shadows that read like printed depth rather than UI elevation.
   ════════════════════════════════════════════════════════════ */

:root {
  /* Spacing scale (4px base) */
  --space-1:  0.25rem;  /*  4 */
  --space-2:  0.5rem;   /*  8 */
  --space-3:  0.75rem;  /* 12 */
  --space-4:  1rem;     /* 16 */
  --space-5:  1.5rem;   /* 24 */
  --space-6:  2rem;     /* 32 */
  --space-7:  3rem;     /* 48 */
  --space-8:  4rem;     /* 64 */
  --space-9:  6rem;     /* 96 */
  --space-10: 8rem;     /* 128 */

  /* Radius */
  --radius-xs:   3px;
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   16px;
  --radius-xl:   24px;
  --radius-pill: 999px;
  --radius-card: var(--radius-md);

  /* Borders */
  --border-width: 1px;
  --border-width-strong: 1.5px;

  /* Shadows — warm-toned, soft */
  --shadow-xs:  0 1px 2px rgba(33,28,22,0.06);
  --shadow-sm:  0 2px 6px rgba(33,28,22,0.08);
  --shadow-md:  0 8px 24px rgba(33,28,22,0.10);
  --shadow-lg:  0 18px 48px rgba(33,28,22,0.14);
  --shadow-hover: 0 14px 36px rgba(33,28,22,0.16);

  /* Image protection gradient (text over photography) */
  --scrim-bottom: linear-gradient(to top, rgba(20,16,12,0.78) 0%, rgba(20,16,12,0.30) 38%, rgba(20,16,12,0) 70%); /* @kind other */
  --scrim-full:   linear-gradient(to top, rgba(20,16,12,0.70) 0%, rgba(20,16,12,0.18) 55%, rgba(20,16,12,0.28) 100%); /* @kind other */

  /* Layout */
  --container-max:  1240px;
  --container-wide: 1440px;
  --container-text: 720px;
  --gutter:         clamp(1.25rem, 4vw, 4rem); /* @kind spacing */

  /* Motion */
  --ease-out:   cubic-bezier(0.22, 0.61, 0.36, 1);   /* @kind other */
  --ease-inout: cubic-bezier(0.65, 0.05, 0.36, 1);   /* @kind other */
  --dur-fast:   140ms;  /* @kind other */
  --dur-base:   240ms;  /* @kind other */
  --dur-slow:   420ms;  /* @kind other */
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: var(--font-body); background: var(--surface-page); color: var(--text-primary); }
#kb-scroll { height: 100vh; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-thumb { background: var(--sand-300); border-radius: 999px; }
</style>

      const map = { home: 'home', list: 'list', regions: 'list', about: 'home', journal: 'home' };
      setRoute({ screen: map[id] || 'home', journeyId: null });

    let body;
    if (route.screen === 'list') body = <window.ListScreen onOpenJourney={onOpenJourney} />;
    else if (route.screen === 'detail') body = <window.DetailScreen journeyId={route.journeyId} onNav={onNav} onOpenJourney={onOpenJourney} />;
    else body = <window.HomeScreen onNav={onNav} onOpenJourney={onOpenJourney} />;
    return (
      <React.Fragment>
        <window.Header current={route.screen === 'detail' ? 'list' : route.screen} onNav={onNav} />
        <main>{body}</main>
        <window.Footer onNav={onNav} />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
